    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
        }

        .contact-container {
            background-color: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            margin: 50px auto;
        }

        h1 {
            font-size: 32px;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 16px;
            color: #555;
            display: block;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #6a11cb;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            background-color: #6a11cb;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #4e0c9c;
        }

        @media (max-width: 600px) {
            .contact-container {
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }
        }

        /* Yukarı kaydırma butonu */
        #scrollTopBtn {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 30px;
            z-index: 99;
            font-size: 18px;
            background-color: #5271ff;
            color: #ffde59;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>

    <!-- Scroll to Top Script -->
    <script>
        window.onscroll = function() {scrollFunction()};

        function scrollFunction() {
            var scrollBtn = document.getElementById("scrollTopBtn");
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                scrollBtn.style.display = "block";
            } else {
                scrollBtn.style.display = "none";
            }
        }

        document.getElementById('scrollTopBtn').onclick = function() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
    </script>
