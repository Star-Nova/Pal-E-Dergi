<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duyuru</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ff5f6d, #ffc371);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .container {
            background-color: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
            background-color: #ff5f6d;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #ff3a4c;
        }

        /* Geri Dön kısmı */
        .back-link {
            margin-top: 20px;
            font-size: 16px;
        }

        .back-link a {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #333;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .back-link a:hover {
            color: #ff5f6d;
            border-color: #ff5f6d;
        }

        /* Basit animasyonlar */
        .container {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Özel Duyurumuz!</h1>
        <p>Pal E-Dergi Yakında Sizlerle Olacaktır ...</p>
        <a href="#">Detaylar İçin Tıklayın</a>
    </div>

    <!-- Geri Dön kısmı -->
    <div class="back-link">
        <a href="index.html">← Geri Dön</a>
    </div>
</body>
</html>
